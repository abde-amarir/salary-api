# ─────────────────────────────────────────────
# This file defines the entire CI/CD pipeline!
# GitHub reads this automatically on every push.
# ─────────────────────────────────────────────

name: CI/CD Pipeline

# TRIGGER: When does this pipeline run?
on:
  push:
    branches: [ main ]      # runs when you push to main
  pull_request:
    branches: [ main ]      # runs on pull requests too

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Run all tests
  # ─────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest   # GitHub gives us a fresh Ubuntu VM!

    steps:
      # Step 1: Download your code onto the VM
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: Install your dependencies
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run ALL 13 tests!
      - name: 🧪 Run pytest
        run: |
          pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # JOB 2: Deploy to Railway (only if tests pass!)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: test          # ← CRITICAL: only runs if test job passed!
    if: github.ref == 'refs/heads/main'  # only on main branch

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy Railway
        run: |
          npm install -g @railway/cli
          railway whoami
          railway up --service $RAILWAY_SERVICE_ID --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 3b558ed1-d26d-4475-9240-761876f43ddb
          RAILWAY_SERVICE_ID: 72276ad2-e13c-4bcf-b5de-2315796099d4